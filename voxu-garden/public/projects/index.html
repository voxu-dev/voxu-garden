<h1>Projects</h1>


<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap');

  .projects-grid {
    display: flex;
    flex-direction: column;
    gap: 2rem;
    margin-top: 2.5rem;
    max-width: 860px;
  }

  .project-card {
    display: block;
    text-decoration: none;
    color: inherit;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.03);
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }

  .project-card:hover {
    transform: translateY(-5px);
    border-color: rgba(255, 255, 255, 0.35);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .project-card__image-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 7;
    overflow: hidden;
  }

  .project-card__image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
    filter: brightness(0.85);
  }

  .project-card:hover .project-card__image {
    transform: scale(1.03);
    filter: brightness(1);
  }

   
  .project-card__image-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 40%,
      rgba(0, 0, 0, 0.75) 100%
    );
    pointer-events: none;
  }

  .project-card__body {
    padding: 1.4rem 1.8rem 1.6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .project-card__title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .project-card__arrow {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }

  .project-card:hover .project-card__arrow {
    background: white;
    border-color: white;
    transform: translateX(3px);
  }

  .project-card__arrow svg {
    transition: stroke 0.2s ease;
    stroke: white;
  }

  .project-card:hover .project-card__arrow svg {
    stroke: black;
  }
</style>

<div class="projects-grid">
  
  <a class="project-card" href="/projects/cyberpunk-alley/">
    
    <div class="project-card__image-wrapper">
      <img class="project-card__image" src="/images/cyberpunk_render.png" alt="Projects">
    </div>
    
    <div class="project-card__body">
      <div class="project-card__title">Cyberpunk Alley | 3D Environment</div>
      <div class="project-card__arrow">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </div>
    </div>
  </a>
  
</div>
