<figure class="audio-player">
  <audio controls>
    {{ $src := .Get "src" }}
    <source src="{{ $src }}" type="audio/mpeg">
    <source src="{{ replace $src ".mp3" ".ogg" }}" type="audio/ogg">
    Your browser does not support the audio element.
  </audio>
  {{ with .Get "caption" }}
    <figcaption>{{ . }}</figcaption>
  {{ end }}
</figure>
